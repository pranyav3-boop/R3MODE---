<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R3MODE — Fashion Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blk:#0a0a0a;--blk2:#111;--blk3:#181818;--blk4:#222;
  --pink:#ff1f6e;--pink-d:#c91557;
  --grn:#b8ff00;--grn-d:#8fcc00;
  --wht:#f0f0f0;--gy:#888;--gy2:#555;
  --bdr:#242424;
  --fh:'Barlow Condensed',sans-serif;
  --fb:'Barlow',sans-serif;
  --fm:'DM Mono',monospace;
  --sw:60px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--blk);color:var(--wht);font-family:var(--fb);overflow-x:hidden;min-height:100vh;max-width:100vw}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--blk2)}
::-webkit-scrollbar-thumb{background:var(--pink)}
button,input,select{font-family:inherit}
img{display:block}

/* LAYOUT */
.wrap{display:flex;min-height:100vh;max-width:100%;overflow-x:hidden}

/* SIDEBAR */
.sb{width:var(--sw);background:var(--blk2);border-right:1px solid var(--bdr);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;align-items:center;z-index:200;padding:14px 0 16px;gap:6px}
.sb-logo{color:var(--grn);font-size:20px;margin-bottom:16px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;width:42px;height:42px}
.sb-btn{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gy);transition:all .15s;border:1px solid transparent;position:relative;-webkit-tap-highlight-color:transparent}
.sb-btn:hover{background:var(--blk3);color:var(--wht)}
.sb-btn.on{background:var(--pink);color:#fff;box-shadow:0 0 16px rgba(255,31,110,.3)}
.sb-btn .tip{position:absolute;left:52px;top:50%;transform:translateY(-50%);background:var(--blk3);border:1px solid var(--bdr);color:var(--wht);font-family:var(--fm);font-size:9px;letter-spacing:2px;padding:5px 10px;border-radius:3px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10}
.sb-btn:hover .tip{opacity:1}
.sb-sp{flex:1}

/* MAIN */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0;overflow-x:hidden}

/* TOPBAR */
.top{height:68px;background:var(--blk);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:100;overflow:hidden}
.top-brand{display:flex;flex-direction:column;flex-shrink:0}
.top-logo{font-family:var(--fh);font-size:38px;font-weight:900;letter-spacing:3px;line-height:1}
.top-tag{font-family:var(--fm);font-size:8px;letter-spacing:3px;color:var(--grn);margin-top:2px}
.srch{display:flex;align-items:center;gap:9px;background:var(--blk2);border:1px solid var(--bdr);border-radius:4px;padding:8px 12px;width:min(260px,40vw);transition:border-color .2s;margin-left:auto;flex-shrink:1;min-width:0}
.srch:focus-within{border-color:var(--pink)}
.srch input{background:none;border:none;outline:none;color:var(--wht);font-family:var(--fm);font-size:10px;letter-spacing:1px;width:100%}
.srch input::placeholder{color:var(--gy2)}
.top-acts{display:flex;gap:7px}
.top-btn{width:38px;height:38px;background:var(--blk2);border:1px solid var(--bdr);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gy);transition:all .15s;position:relative}
.top-btn:hover{border-color:var(--gy);color:var(--wht)}
.top-btn.gold{border-color:#f5a623;color:#f5a623;background:rgba(245,166,35,.08)}

/* TAGBAR */
.tgbar{height:42px;background:var(--grn);display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tgbar::-webkit-scrollbar{display:none}
.tg{display:flex;align-items:center;gap:8px;padding:0 20px;height:100%;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:2px;color:#000;cursor:pointer;white-space:nowrap;border-right:2px solid rgba(0,0,0,.1);transition:background .15s;-webkit-tap-highlight-color:transparent}
.tg:hover{background:rgba(0,0,0,.08)}
.tg.on{background:#000;color:var(--grn)}
.tg-d{font-size:6px;color:rgba(0,0,0,.3)}

/* PAGES */
.pg{display:none}
.pg.on{display:block;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SECTION HEADER */
.sh{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.sl{font-family:var(--fh);font-size:22px;font-weight:900;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.sl .bolt{color:var(--pink)}
.sc{font-family:var(--fm);font-size:9px;color:var(--gy);letter-spacing:2px;margin-left:auto}

/* CATEGORY PILLS */
.cp{display:inline-block;font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 9px;border-radius:2px}
.cr{background:var(--pink);color:#fff}
.ct{background:var(--grn);color:#000}
.cb{background:#00b4ff;color:#000}
.cs{background:#a78bfa;color:#fff}

/* IMAGE CARD */
.icard{border-radius:8px;overflow:hidden;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;background:var(--blk2);border:1px solid var(--bdr)}
.icard:hover{transform:translateY(-3px);border-color:var(--gy2)}
.icard:hover .icard-img{transform:scale(1.05)}
.icard-imgw{position:relative;flex-shrink:0;overflow:hidden}
.icard-img{width:100%;height:100%;background-size:cover;background-position:center;background-repeat:no-repeat;transition:transform .45s;background-color:var(--blk3)}
.icard-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.4) 45%,transparent 100%)}
.icard-pill{position:absolute;top:10px;left:10px;z-index:2}
.icard-body{position:absolute;bottom:0;left:0;right:0;padding:14px 15px;z-index:2}
.icard-title{font-family:var(--fh);font-size:21px;font-weight:900;line-height:1.1;letter-spacing:.4px;text-transform:uppercase;color:#fff;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 10px rgba(0,0,0,.8)}
.icard-meta{display:flex;align-items:center;gap:6px;font-family:var(--fm);font-size:9px;letter-spacing:1px}
.icard-src{color:rgba(255,255,255,.8)}
.icard-sep{color:rgba(255,255,255,.25)}
.icard-time{color:rgba(255,255,255,.45)}
.icard-ext{margin-left:auto;color:rgba(255,255,255,.55);font-size:13px;transition:color .15s}
.icard-ext:hover{color:#fff}
/* Reaction bar */
.rxn-row{display:flex;align-items:center;gap:6px;padding:8px 12px 10px;border-top:1px solid var(--bdr)}
.rxn-b{display:flex;align-items:center;gap:4px;font-family:var(--fm);font-size:9px;letter-spacing:1px;color:var(--gy);padding:5px 10px;border:1px solid var(--bdr);border-radius:3px;cursor:pointer;transition:all .12s;background:transparent;line-height:1;-webkit-tap-highlight-color:transparent}
.rxn-b:hover{color:var(--wht);border-color:var(--gy2)}
.rxn-b.liked{color:var(--pink);border-color:var(--pink);background:rgba(255,31,110,.08)}
.rxn-b.disliked{color:var(--gy2);border-color:var(--gy2)}
.fav-b{display:flex;align-items:center;gap:4px;font-family:var(--fm);font-size:9px;letter-spacing:1px;color:var(--gy);padding:5px 10px;border:1px solid var(--bdr);border-radius:3px;cursor:pointer;transition:all .12s;background:transparent;line-height:1;margin-left:auto;-webkit-tap-highlight-color:transparent}
.fav-b:hover{color:var(--wht);border-color:var(--gy2)}
.fav-b.sv{color:var(--grn);border-color:var(--grn);background:rgba(184,255,0,.07)}

/* GRIDS */
.pad{padding:20px 16px 0}
.pad-full{padding:16px}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.divr{height:1px;background:var(--bdr);margin:26px 26px}

/* FILTER TABS */
.fr{padding:0 26px;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.fb{font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border-radius:3px;border:1px solid var(--bdr);cursor:pointer;color:var(--gy);background:transparent;transition:all .15s;-webkit-tap-highlight-color:transparent}
.fb:hover{color:var(--wht);border-color:var(--gy2)}
.fb.on{background:var(--wht);color:#000;border-color:var(--wht)}

/* HERO */
.lhero{width:100%;height:380px;border-radius:10px;overflow:hidden;position:relative;cursor:pointer;margin-bottom:18px}
.lhero-img{width:100%;height:100%;background-size:cover;background-position:center;background-repeat:no-repeat;transition:transform .5s}
.lhero:hover .lhero-img{transform:scale(1.03)}
.lhero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.3) 55%,transparent 100%)}
.lhero-bd{position:absolute;bottom:0;left:0;right:0;padding:30px 32px}
.lhero-t{font-family:var(--fh);font-size:42px;font-weight:900;letter-spacing:1px;text-transform:uppercase;line-height:1.05;color:#fff;margin:10px 0 14px}
.lhero-m{display:flex;align-items:center;gap:12px;font-family:var(--fm);font-size:10px;color:rgba(255,255,255,.5);letter-spacing:1px}
.rd-btn{margin-left:auto;background:var(--pink);color:#fff;border:none;border-radius:3px;font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:9px 20px;cursor:pointer;transition:all .15s}
.rd-btn:hover{background:var(--pink-d)}

/* FAVS PAGE */
.fav-pg{padding:26px}
.frow{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
.fc{background:var(--blk2);border:1px solid var(--bdr);border-radius:6px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.fc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--pink);opacity:0;transition:opacity .2s}
.fc:hover::before{opacity:1}
.fc:hover{transform:translateY(-2px)}
.fc-ico{font-size:24px;margin-bottom:9px;display:block}
.fc-n{font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--wht);margin-bottom:3px}
.fc-c{font-family:var(--fm);font-size:9px;color:var(--gy)}
.add-fc{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-style:dashed;color:var(--gy2)}
.add-fc:hover{color:var(--pink);border-color:var(--pink)!important}

/* TICKER */
.ticker-w{background:var(--pink);height:34px;display:flex;align-items:center;overflow:hidden;flex-shrink:0;position:sticky;bottom:0;z-index:50;width:100%}
.ticker-lbl{background:#000;color:var(--pink);font-family:var(--fm);font-size:8px;letter-spacing:3px;padding:0 14px;height:100%;display:flex;align-items:center;flex-shrink:0;white-space:nowrap;z-index:2}
.ticker-tr{display:flex;flex-shrink:0;will-change:transform;animation:tick 45s linear infinite}
.ticker-tr:hover{animation-play-state:paused}
.t-item{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#000;padding:0 28px;white-space:nowrap;flex-shrink:0}
.t-item a{color:#000;text-decoration:none}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ARTICLE MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.ov.on{display:flex;animation:fo .2s ease}
@keyframes fo{from{opacity:0}to{opacity:1}}
.md{background:var(--blk2);border:1px solid var(--bdr);border-radius:10px;width:100%;max-width:740px;max-height:92vh;overflow-y:auto;position:relative}
.md-x{position:absolute;top:14px;right:14px;width:32px;height:32px;background:rgba(0,0,0,.6);border:1px solid var(--bdr);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gy);font-size:14px;z-index:10;transition:all .15s;-webkit-tap-highlight-color:transparent}
.md-x:hover{border-color:var(--pink);color:var(--pink)}
.md-iw{height:260px;overflow:hidden;position:relative;flex-shrink:0}
.md-img{width:100%;height:100%;background-size:cover;background-position:center;background-repeat:no-repeat}
.md-iov{position:absolute;inset:0;background:linear-gradient(to top,var(--blk2) 0%,transparent 60%)}
.md-bd{padding:24px 28px 0}
.md-sr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.md-sn{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--grn);display:flex;align-items:center;gap:7px}
.ld{width:7px;height:7px;background:var(--grn);border-radius:50%;animation:pl 2s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.md-dt{font-family:var(--fm);font-size:9px;color:var(--gy2);margin-left:auto}
.md-t{font-family:var(--fh);font-size:30px;font-weight:900;letter-spacing:1px;text-transform:uppercase;line-height:1.1;margin-bottom:18px}
.ai-box{background:var(--blk3);border:1px solid var(--grn);border-radius:6px;padding:18px;margin-bottom:18px;position:relative;overflow:hidden}
.ai-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--grn),transparent)}
.ai-lbl{display:flex;align-items:center;gap:7px;font-family:var(--fm);font-size:8px;letter-spacing:3px;color:var(--grn);margin-bottom:12px}
.ai-spin{display:flex;align-items:center;gap:8px;color:var(--gy);font-family:var(--fm);font-size:10px}
.spn{width:13px;height:13px;border:2px solid var(--bdr);border-top-color:var(--grn);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ai-sum{font-size:13px;line-height:1.75;color:var(--gy);margin-bottom:12px}
.ai-tks{display:flex;flex-direction:column;gap:7px}
.ai-tk{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--gy)}
.ai-tk::before{content:'→';color:var(--pink);font-family:var(--fh);font-weight:700;flex-shrink:0}
.md-ex{font-size:13px;line-height:1.8;color:var(--gy);margin-bottom:8px}
.md-rxns{display:flex;gap:8px;padding:0 28px 14px;align-items:center;flex-wrap:wrap}
.md-rxn-b{display:flex;align-items:center;gap:5px;font-family:var(--fm);font-size:10px;color:var(--gy);padding:7px 14px;border:1px solid var(--bdr);border-radius:3px;cursor:pointer;transition:all .15s;background:transparent;-webkit-tap-highlight-color:transparent}
.md-rxn-b:hover{color:var(--wht);border-color:var(--gy2)}
.md-rxn-b.liked{color:var(--pink);border-color:var(--pink);background:rgba(255,31,110,.08)}
.md-rxn-b.disliked{color:var(--gy2);border-color:var(--gy2)}
.md-acts{display:flex;gap:9px;flex-wrap:wrap;padding:14px 28px 24px;border-top:1px solid var(--bdr)}
.btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:10px 20px;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:all .15s;text-decoration:none;-webkit-tap-highlight-color:transparent}
.bp{background:var(--pink);color:#fff;border-color:var(--pink)}.bp:hover{background:var(--pink-d)}
.bg{background:transparent;border-color:var(--bdr);color:var(--gy)}.bg:hover{border-color:var(--gy);color:var(--wht)}
.bn{background:var(--grn);color:#000;border-color:var(--grn)}.bn:hover{background:var(--grn-d)}

/* FOLDER PICKER */
.fp-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:18px 26px}
.fp-item{padding:12px;background:var(--blk3);border:1px solid var(--bdr);border-radius:5px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.fp-item:hover{border-color:var(--gy2)}
.fp-item.sel{border-color:var(--grn);background:rgba(184,255,0,.08)}
.fp-item.sel .fp-check{opacity:1}
.fp-check{width:16px;height:16px;border-radius:50%;background:var(--grn);display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:900;margin-left:auto;flex-shrink:0;opacity:0;transition:opacity .15s}
/* Long-press hint on save button */
.fav-b{position:relative}
.fav-b::after{content:'HOLD FOR FOLDERS';position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--blk3);border:1px solid var(--bdr);color:var(--gy);font-family:var(--fm);font-size:7px;letter-spacing:1px;padding:4px 8px;border-radius:3px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;z-index:10}
.fav-b:hover::after{opacity:1}
/* Folder picker header */
.fp-head{padding:20px 26px 0;border-bottom:1px solid var(--bdr);margin-bottom:0;padding-bottom:16px}
.fp-head-t{font-family:var(--fh);font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--wht);margin-bottom:4px}
.fp-head-s{font-family:var(--fm);font-size:9px;color:var(--gy);letter-spacing:1px}
.fp-new{display:flex;align-items:center;gap:8px;padding:10px 26px;border-top:1px solid var(--bdr);cursor:pointer;color:var(--gy);font-family:var(--fm);font-size:9px;letter-spacing:1px;transition:color .15s}
.fp-new:hover{color:var(--grn)}
.fp-new svg{flex-shrink:0}

/* EMPTY STATE */
.emp{text-align:center;padding:50px 18px;color:var(--gy2)}
.emp-i{font-size:38px;margin-bottom:13px}
.emp-t{font-family:var(--fh);font-size:20px;font-weight:800;letter-spacing:2px;color:var(--gy);margin-bottom:5px}
.emp-s{font-size:12px}

/* NOTIF */
.nf{position:fixed;bottom:22px;right:22px;background:var(--blk2);border:1px solid var(--grn);border-radius:5px;padding:11px 16px;font-family:var(--fm);font-size:10px;letter-spacing:1px;color:var(--grn);z-index:9999;transform:translateY(70px);opacity:0;transition:all .3s;pointer-events:none}
.nf.on{transform:translateY(0);opacity:1}

/* MOBILE */
@media(max-width:900px){
  .dgrid{grid-template-columns:repeat(2,1fr)}
  .lgrid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  :root{--sw:0px}
  .sb{display:none}
  .main{margin-left:0;padding-bottom:102px}
  .dgrid{grid-template-columns:1fr}
  .lgrid{grid-template-columns:1fr}
  .frow{grid-template-columns:repeat(2,1fr)}
  .lhero{height:260px}
  .lhero-t{font-size:24px}
  .top-logo{font-size:26px}
  .mob-nav{display:flex!important}
  .top-acts{display:none}
}
.mob-nav{display:none;position:fixed;bottom:34px;left:0;right:0;height:64px;background:var(--blk2);border-top:1px solid var(--bdr);align-items:center;justify-content:space-around;z-index:300;padding:0}
.mob-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex:1;height:100%;cursor:pointer;color:var(--gy);font-family:var(--fm);font-size:7px;letter-spacing:1px;border:none;background:transparent;transition:color .15s;-webkit-tap-highlight-color:transparent;padding:0}
.mob-btn.on{color:var(--pink)}
.mob-btn.on svg{stroke:var(--pink)}

body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.025) 3px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:9990}
</style>
</head>
<body>
<div class="wrap">

<!-- SIDEBAR -->
<aside class="sb">
  <div class="sb-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#b8ff00" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
  </div>
  <div class="sb-btn on" id="nb-fd" onclick="nav('feed',this)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="tip">HOME</span>

let favs=new Set(), curF='all', curA=null, fpSel=new Set(), fpArtId=null;
let lpTimer=null, lpTriggered=false;

// ── LOCALSTORAGE PERSISTENCE ──
function saveState(){
  try{
    const data={
      favs:[...favs],
      folders:FOLDERS.map(f=>({...f})),
      reactions:ART.map(a=>({id:a.id,lk:a.lk,dk:a.dk,rxn:a.rxn}))
    };
    localStorage.setItem('r3mode_state', JSON.stringify(data));
  }catch(e){}
}

function loadState(){
  try{
    const raw=localStorage.getItem('r3mode_state');
    if(!raw) return;
    const data=JSON.parse(raw);
    // restore favs
    if(data.favs) data.favs.forEach(id=>favs.add(id));
    // restore folder contents
    if(data.folders) data.folders.forEach(saved=>{
      const f=FOLDERS.find(x=>x.id===saved.id);
      if(f) f.arts=saved.arts||[];
    });
    // restore reactions
    if(data.reactions) data.reactions.forEach(r=>{
      const a=ART.find(x=>x.id===r.id);
      if(a){a.lk=r.lk;a.dk=r.dk;a.rxn=r.rxn;}
    });
  }catch(e){}
}

// ── HELPERS ──
function cc(c){return{runway:'cr',trends:'ct',business:'cb',sustainability:'cs'}[c]||'ct'}
function cl(c){return c.toUpperCase()}
function q(id){return document.getElementById(id)}
let ntT; function nt(m){const e=q('nf');e.textContent=m;e.classList.add('on');clearTimeout(ntT);ntT=setTimeout(()=>e.classList.remove('on'),2400)}

// ── CARD BUILDERS ──
function rxnBar(a){
  return `<div class="rxn-row" onclick="event.stopPropagation()">
    <button class="rxn-b${a.rxn==='like'?' liked':''}" data-rl="${a.id}" onclick="artRxn(${a.id},'like',event)">♥ ${a.lk}</button>
    <button class="rxn-b${a.rxn==='dis'?' disliked':''}" data-rd="${a.id}" onclick="artRxn(${a.id},'dis',event)">✕ ${a.dk}</button>
    <button class="fav-b${favs.has(a.id)?' sv':''}" data-fav="${a.id}"
      onclick="togFav(${a.id},this,event)"
      onmousedown="startLongPress(${a.id},this,event)"
      onmouseup="cancelLongPress()"
      onmouseleave="cancelLongPress()"
      ontouchstart="startLongPress(${a.id},this,event)"
      ontouchend="cancelLongPress()"
      ontouchcancel="cancelLongPress()"
    >${favs.has(a.id)?'♥ SAVED':'♡ SAVE'}</button>
  </div>`
}

function card(a, h){
  const imgH=h||260;
  return `<div class="icard" onclick="openA(${a.id})">
    <div class="icard-imgw" style="height:${imgH}px">
      <div class="icard-img" style="background-image:url('${catImg(a.cat)}')"></div>
      <div class="icard-grad"></div>
      <span class="cp ${cc(a.cat)} icard-pill">${cl(a.cat)}</span>
      <div class="icard-body">
        <div class="icard-title">${a.t}</div>
        <div class="icard-meta">
          <span class="icard-src">${a.src}</span>
          <span class="icard-sep">///</span>
          <span class="icard-time">${a.d}</span>
          <span class="icard-ext" onclick="event.stopPropagation();window.open('${a.url}','_blank')">↗</span>
        </div>
      </div>
    </div>
    ${rxnBar(a)}
  </div>`
}

// ── REACTIONS ──
function artRxn(id,type,e){
  e.stopPropagation();
  const a=ART.find(x=>x.id===id); if(!a) return;
  const prev=a.rxn;
  if(prev==='like')a.lk--; if(prev==='dis')a.dk--;
  a.rxn=(prev===type)?null:type;
  if(a.rxn==='like')a.lk++; if(a.rxn==='dis')a.dk++;
  document.querySelectorAll(`[data-rl="${id}"]`).forEach(b=>{b.className=`rxn-b${a.rxn==='like'?' liked':''}`;b.innerHTML=`♥ ${a.lk}`});
  document.querySelectorAll(`[data-rd="${id}"]`).forEach(b=>{b.className=`rxn-b${a.rxn==='dis'?' disliked':''}`;b.innerHTML=`✕ ${a.dk}`});
  nt(a.rxn==='like'?'♥ LIKED':a.rxn==='dis'?'✕ PASSED':'REACTION REMOVED');
  saveState();
}

// ── FAVOURITES ──
function togFav(id,btn,e){
  if(e){e.stopPropagation();if(lpTriggered){lpTriggered=false;return;}}
  favs.has(id)?favs.delete(id):favs.add(id);
  const sv=favs.has(id);
  document.querySelectorAll(`[data-fav="${id}"]`).forEach(b=>{b.className=`fav-b${sv?' sv':''}`;b.textContent=sv?'♥ SAVED':'♡ SAVE'});
  if(curA&&curA.id===id)q('m-fv').textContent=sv?'♥ SAVED':'♡ SAVE';
  nt(sv?'♥ SAVED — HOLD TO CHOOSE FOLDER':'REMOVED FROM SAVED');
  saveState();
}

  const hero=ar[0], rest=ar.slice(1);
  q('hero-slot').innerHTML=hero?`
    <div class="lhero" onclick="openA(${hero.id})">
      <div class="lhero-img" style="background-image:url('${catImg(hero.cat)}')"></div>

        <span class="cp ${cc(hero.cat)}">${cl(hero.cat)}</span>

        <div class="lhero-m">
          <span>${hero.src}</span><span style="color:var(--gy2)">///</span><span>${hero.d}</span>
          <button class="rd-btn" onclick="event.stopPropagation();openA(${hero.id})">READ →</button>

function tgC(cat,el){document.querySelectorAll('.tg').forEach(t=>t.classList.remove('on'));el.classList.add('on');rLatest(cat==='all'?'all':cat)}
function doSearch(v){
  v=v.toLowerCase().trim();
  // Always switch to feed page when searching
  if(!q('pg-feed').classList.contains('on')){
    nav('feed', q('nb-fd'));
    document.querySelectorAll('.mob-btn').forEach(b=>b.classList.remove('on'));
    const mb=q('mb-fd'); if(mb) mb.classList.add('on');
  }
  if(!v){
    // Clear — restore normal feed
    const ts2=q('todrop-section');if(ts2)ts2.style.display='';
    const dv2=document.querySelector('.divr');if(dv2)dv2.style.display='';
    document.querySelector('.sh .bolt') && (document.querySelector('.todrop .sh .sl').innerHTML='<span class="bolt">⚡</span> TODAY\'S DROP');
    const clr2=q('srch-clear');if(clr2)clr2.style.display='none';
    rDrop(); rLatest(curF);
    q('lcount').textContent=ART.length+' STORIES';
    return;
  }
  const clr=q('srch-clear'); if(clr) clr.style.display=v?'block':'none';
  const r=ART.filter(a=>
    a.t.toLowerCase().includes(v) ||
    a.src.toLowerCase().includes(v) ||
    a.cat.toLowerCase().includes(v) ||
    a.ex.toLowerCase().includes(v)
  );
  // Hide TODAY'S DROP section, show all results in latest grid
  const ts=q('todrop-section');if(ts)ts.style.display='none';
  const dv=document.querySelector('.divr');if(dv)dv.style.display='none';
  q('hero-slot').innerHTML='';
  q('lcount').textContent=r.length+' RESULT'+(r.length!==1?'S':'')+' FOR "'+v.toUpperCase()+'"';
  q('lgrid').innerHTML=r.length
    ? r.map(a=>card(a,190)).join('')
    : `<div class="emp" style="grid-column:1/-1">
        <div class="emp-i">🔍</div>
        <div class="emp-t">NO RESULTS</div>
        <div class="emp-s">Try runway, trends, business or sustainability</div>
       </div>`;
}

  q('m-ex').textContent=a.ex; q('m-lnk').href=a.url;

  if(!curA)return;

function addFolder(){const n=prompt('FOLDER NAME:');if(!n)return;const ic=['📁','⭐','💫','🔥','📌'];FOLDERS.push({id:'f'+Date.now(),n:n.toUpperCase(),ic:ic[Math.floor(Math.random()*ic.length)],arts:[]});rFavs();nt('FOLDER CREATED')}


function confirmFP(){
  if(!fpArtId) return;
  // Add to selected folders
  FOLDERS.forEach(f=>{
    if(fpSel.has(f.id)){
      if(!f.arts.includes(fpArtId)) f.arts.push(fpArtId);
    } else {
      // Remove from deselected folders
      f.arts = f.arts.filter(id=>id!==fpArtId);
    }
  });
  closeOv('fp-ov');
  saveState();
  const count=fpSel.size;
  nt(count?'✓ SAVED TO '+count+' FOLDER'+(count>1?'S':''):'REMOVED FROM FOLDERS');
  if(q('frow-folders')) rFavs();
}
function openFP(artId){
  fpArtId = artId || (curA ? curA.id : null);
  if(!fpArtId) return;
  fpSel=new Set();
  // Pre-select folders that already contain this article
  FOLDERS.forEach(f=>{ if(f.arts.includes(fpArtId)) fpSel.add(f.id); });
  const art = ART.find(x=>x.id===fpArtId);
  q('fp-art-title').textContent = art ? art.t : '';
  q('fp-grid').innerHTML=FOLDERS.map(f=>{
    const inFolder=f.arts.includes(fpArtId);
    if(inFolder) fpSel.add(f.id);
    return `<div class="fp-item${inFolder?' sel':''}" data-id="${f.id}" onclick="this.classList.toggle('sel');fpT('${f.id}')">
      <span style="font-size:20px">${f.ic}</span>
      <div style="flex:1">
        <div style="font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--wht)">${f.n}</div>
        <div style="font-size:9px;color:var(--gy)">${f.arts.length} saved</div>
      </div>
      <span class="fp-check">✓</span>
    </div>`;
  }).join('');
  // Also save to favs if not already
  if(!favs.has(fpArtId)){
    favs.add(fpArtId);
    document.querySelectorAll(`[data-fav="${fpArtId}"]`).forEach(b=>{b.className='fav-b sv';b.textContent='♥ SAVED'});
    if(curA&&curA.id===fpArtId) q('m-fv').textContent='♥ SAVED';
  }
  q('fp-ov').classList.add('on');
}
function fpT(id){fpSel.has(id)?fpSel.delete(id):fpSel.add(id);}

// ── LONG PRESS ──
function startLongPress(id, btn, e){
  e.stopPropagation();
  lpTriggered = false;
  lpTimer = setTimeout(()=>{
    lpTriggered = true;
    cancelLongPress();
    // Haptic feedback on mobile
    if(navigator.vibrate) navigator.vibrate(40);
    openFP(id);
  }, 500);
}
function cancelLongPress(){
  clearTimeout(lpTimer);
}

// ── ADD FOLDER FROM PICKER ──
function addFolderFP(){
  const n=prompt('NEW FOLDER NAME:');
  if(!n||!n.trim()) return;
  const ic=['📁','⭐','💫','🔥','📌','💎','🎯','🏷️'];
  const newF={id:'f'+Date.now(),n:n.trim().toUpperCase(),ic:ic[Math.floor(Math.random()*ic.length)],arts:[]};
  FOLDERS.push(newF);
  nt('FOLDER CREATED: '+newF.n);
  openFP(fpArtId); // re-render picker with new folder
}

// ── NAV ──
function nav(pg,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('on'));
  q(`pg-${pg}`).classList.add('on');
  if(btn)btn.classList.add('on');
  if(pg==='favs')rFavs();
  window.scrollTo(0,0);
}
function mbSync(btn){document.querySelectorAll('.mob-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on')}

// ── CLOSE ──
function closeOv(id){q(id).classList.remove('on');document.body.style.overflow=''}
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeOv(o.id)}));

// ── TICKER ──
function initTicker(){
  const items = ART.map(a =>
    `<span class="t-item">${a.src.toUpperCase()} <span style="color:rgba(0,0,0,.4);margin:0 4px">—</span> ${a.t} <span style="color:rgba(0,0,0,.3);margin-left:8px">◆</span></span>`
  ).join('');
  // Duplicate 3x to ensure seamless loop at any screen width
  q('ticker').innerHTML = items + items + items;
}

// ── BOOT ──
loadState();
initTicker(); rDrop(); rLatest();
</script>
